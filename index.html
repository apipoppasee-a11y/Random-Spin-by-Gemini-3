<!DOCTYPE html>
<html lang="th">
<head>

    <title>Gemini Ultimate Spin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="header">

    </div>

    <script src="script.js"></script>
